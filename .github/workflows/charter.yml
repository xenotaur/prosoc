name: Charter consistency check

on:
  pull_request:
    paths:
      - "prosoc/charter/**"
      - "scripts/distill/charter"
      - ".github/workflows/charter.yml"
  push:
    branches:
      - main

jobs:
  check-charter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pyyaml jsonschema

      - name: Run charter distillation (dry-run)
        run: |
          scripts/distill/charter --dry-run

      - name: Check that charter.yml is up to date
        run: |
          git diff --exit-code prosoc/charter/charter.yml
