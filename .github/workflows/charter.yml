name: Charter consistency check

on:
  pull_request:
    paths:
      - "prosoc/charter/**"
      - "scripts/distill/charter"
      - ".github/workflows/charter.yml"
  push:
    branches:
      - main

jobs:
  check-charter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pyyaml jsonschema

      - name: Run charter distillation (dry-run)
        run: |
          scripts/distill/charter --dry-run

      - name: Check that charter.yml is up to date
        run: |
          git diff --exit-code prosoc/charter/charter.yml
