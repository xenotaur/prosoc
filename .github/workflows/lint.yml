name: Lint and formatting checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black==25.12.0

      - name: Ruff lint (check only)
        run: |
          ruff check prosoc tests

      - name: Black formatting check
        run: |
          black --check prosoc tests
