id: frontal_approach_01
name: Frontal Approach
summary: 'A robot and a human approach each other in opposite directions in a narrow
  hallway and pass each other safely, comfortably, and without prolonged hesitation.

  '
scientific_purpose: pedestrian interaction
geometric_layout: passable space
context:
  environment:
    type: indoor
    setting: office hallway
    width: narrow
  social_setting:
    formality: informal
    crowd_level: low
agents:
  robot:
    role: navigating_agent
    capabilities:
    - forward_motion
    - steering
    - stopping
  humans:
  - role: pedestrian
    count: 1
    attributes:
      mobility: typical
      awareness: typical
initial_conditions:
  robot_position: end_of_hallway
  human_position: opposite_end
  visibility: clear
intended_robot_task: navigate from A to B
intended_human_behavior: navigate from B to A
expected_behaviors:
  must:
  - maintain a safe physical distance
  - avoid physical contact or forcing evasive action
  should:
  - signal intent clearly through motion or positioning
  - resolve hesitation without prolonged deadlock
  - yield if appropriate given the spatial configuration
  should_not:
  - force the human to stop abruptly
  - invade personal space
  - advance aggressively in a way that causes discomfort
relevant_principles:
- P1
- P2
- P3
- P5
- P6
ideal_outcome: robot and human pass each other safely, comfortably, and without prolonged
  hesitation
cited_in:
- '50'
- '126'
- '167'
scenario_usage_guide:
  success_metrics:
  - SR
  - NoCollisions
  quality_metrics:
  - P2
  - P3
  - P5
  failure_modes:
  - robot collides with human
  - robot fails to make progress toward passing
  labeling_criteria:
  - robot and human face each other at the start of the episode
  - robot and human move toward each other
  - sufficient clearance exists for passing
evaluation_notes: 'This scenario evaluates how well the robot navigates through shared
  space with a human in the conditions for a mild and typical conflict. Changing direction,
  slowing down, braking or hesitation may be acceptable if they increase safety, comfort,
  or legibility, but  prolonged deadlock, abrupt reversals, or aggressive advancement
  are indicative of poor performance.

  The scenario assumes a pedestrian with a typical level of awareness, neither oblivious
  to the presence of the robot nor overly attentive to it.'
