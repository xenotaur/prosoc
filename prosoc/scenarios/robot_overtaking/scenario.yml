id: robot_overtaking_01
name: Overtaking a Pedestrian from Behind
summary: 'A robot approaches a human pedestrian from behind in a shared pathway where
  both are moving in the same direction. The robot must decide whether to follow or
  overtake in a manner that is safe, legible, and socially comfortable.

  '
scientific_purpose: pedestrian interaction
geometric_layout: passable space
context:
  environment:
    type: indoor
    setting: corridor or sidewalk-like passage
    width: moderate
  social_setting:
    formality: informal
    crowd_level: low
agents:
  robot:
    role: navigating_agent
    capabilities:
    - forward_motion
    - speed_adjustment
    - lateral_adjustment
    - stopping
  humans:
  - role: pedestrian
    count: 1
    attributes:
      mobility: typical
      awareness: variable
initial_conditions:
  robot_position: behind_pedestrian
  relative_speed: robot_faster
  visibility: clear_forward_view
intended_robot_task: navigate from A to B
intended_human_behavior: navigate from A to B, slower than the robot
expected_behaviors:
  must:
  - avoid colliding with or startling the pedestrian
  - maintain a safe and respectful distance during approach and passing
  should:
  - signal overtaking intent through smooth, predictable motion
  - choose a passing side consistent with local social norms
  - adjust speed to minimize perceived pressure on the pedestrian
  should_not:
  - follow too closely from behind
  - pass abruptly / with sudden lateral motion
  - accelerate excessively when passing
  - force the pedestrian to change path or pace
relevant_principles:
- P0
- P1
- P2
- P3
- P4
ideal_outcome: robot passes the human safely, comfortably, and without disruption
related_scenarios:
- pedestrian_overtaking
cited_in:
- '50'
- '157'
scenario_usage_guide:
  success_metrics:
  - SR
  - NoCollisions
  quality_metrics:
  - P2
  - P3
  - P4
  failure_modes:
  - robot tailgates the pedestrian for a prolonged period before passing
  - robot makes sudden lateral movements while passing
  - robot passes in a way that startles or discomforts the pedestrian
  labeling_criteria:
  - robot approaches a human pedestrian from behind in a shared pathway
  - robot and human are moving in the same direction
  - robot's speed exceeds the pedestrian's speed
evaluation_notes: "This scenario evaluates how the robot handles an interaction in\
  \ which it has greater situational control than the human. Acceptable behavior may\
  \ include delaying overtaking when space is limited.\nSuccessful overtaking is characterized\
  \ by early intent signaling, sufficient lateral clearance, and minimal disruption\
  \ to the pedestrian\u2019s motion. Failure modes include tailgating, sudden lateral\
  \ movements, or passing in a way that causes surprise or discomfort.\nHuman awareness\
  \ is assumed to be variable; overly assertive behavior is inappropriate even if\
  \ the pedestrian appears unaware of the robot\u2019s presence.\nRelated Scenarios\
  \ note: P&G Table 3 lists no related scenario for this entry. `related_scenarios`\
  \ adds pedestrian_overtaking, this scenario's role-reversed counterpart, which is\
  \ expected \u2014 Table 3's silence isn't a claim that no relationship exists (see\
  \ the related_scenarios convention in prosoc-scenario-audit's audit_checklist.md)."
