id: object_handover_01
name: Object Handover
summary: 'A robot in a servant role navigates to a human and hands over an object.
  The robot must transition from open navigation to a close-range, comfortable final
  approach, present the object for an easy reach, and recognize when the human has
  received it.

  '
scientific_purpose: interactive navigation
geometric_layout: passable space
context:
  environment:
    type: generic
    setting: home, office, or service environment
    width: moderate
  social_setting:
    formality: informal
    crowd_level: low
agents:
  robot:
    role: servant
    capabilities:
    - forward_motion
    - steering
    - stopping
    - speed_adjustment
    - orientation_control
    - object_manipulation
  humans:
  - role: pedestrian
    count: 1
    attributes:
      mobility: typical
      awareness: typical
initial_conditions:
  robot_position: some distance from the human, carrying an object to deliver
  human_position: stationary, aware of the robot's approach
  object_state: held by the robot, to be transferred to the human
intended_robot_task: deliver the object to the human
intended_human_behavior: receive the object
expected_behaviors:
  must:
  - avoid collision with the human during approach
  - not release the object before the human has a secure grip
  should:
  - approach at a moderate, predictable pace
  - stop at a distance and orientation suitable for a comfortable handover
  - present the object so the human can reach it naturally
  - recognize when the object has been received and disengage
  should_not:
  - approach in a way that startles the human
  - stop too far away, requiring the human to step forward or overreach
  - continue holding the object after the human has taken hold
relevant_principles:
- P1
- P2
- P4
- P6
ideal_outcome: human takes the object from the robot without awkwardness, collision,
  or dropped object
related_scenarios:
- crash_cart
cited_in:
- '161'
scenario_usage_guide:
  success_metrics:
  - SR
  - NoCollisions
  quality_metrics:
  - P2
  - P4
  failure_modes:
  - robot collides with or startles the human during final approach
  - robot stops too far away, forcing an awkward reach
  - object is dropped due to premature release or unclear grip timing
  - robot lingers after handover, prolonging the interaction unnecessarily
  labeling_criteria:
  - the robot is carrying or holding an object intended for a specific human
  - the robot's task terminates in a close-range handover rather than a pass-through
  - the episode includes a final approach phase distinct from open-space navigation
evaluation_notes: 'This scenario spans both navigation and manipulation-adjacent behavior;
  evaluators focused purely on trajectory metrics should still assess the final approach
  distance and orientation, since these are the primary social navigation contribution
  to an otherwise manipulation-heavy task.

  The appropriate handover distance is context-dependent (e.g., closer for a small
  light object, more cautious for a hot beverage or sharp object) and should be noted
  when instantiating this scenario for a specific object type.

  This scenario is related to Crash Cart, a specialized variant involving urgent medical
  delivery in an indoor setting, and to Robot Courier (a general delivery task without
  the close-range interactive handoff emphasized here).

  Related Scenarios note: P&G Table 3 lists "Robot Courier" as this scenario''s related
  entry, which has no implemented scenario directory under prosoc/scenarios/. `related_scenarios`
  instead references crash_cart, which this card''s own Notes section already discusses.
  This is expected per the related_scenarios convention (prosoc-scenario-audit''s
  audit_checklist.md), not a source-fidelity gap.'
