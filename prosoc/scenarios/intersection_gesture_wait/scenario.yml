id: intersection_gesture_wait_01
name: "Intersection \u2013 Gesture Wait"
summary: 'A robot and a human pedestrian approach an indoor intersection. The human
  explicitly gestures for the robot to wait. The robot must recognize and comply with
  the gesture, yielding the intersection safely and legibly.

  '
scientific_purpose: pedestrian interaction
geometric_layout: intersection
context:
  environment:
    type: indoor
    setting: hallway intersection
    width: moderate
  social_setting:
    formality: informal
    crowd_level: low
agents:
  robot:
    role: servant
    capabilities:
    - forward_motion
    - speed_adjustment
    - stopping
    - gesture_recognition
  humans:
  - role: pedestrian
    count: 1
    attributes:
      mobility: typical
      gesturing: wait
initial_conditions:
  approach_pattern: orthogonal
  arrival_timing: near_simultaneous
  visibility: mutual
intended_robot_task: navigate from A to B
intended_human_behavior: cross navigate (gesture wait)
expected_behaviors:
  must:
  - "recognize the human\u2019s gesture requesting the robot to wait"
  - stop or slow before entering the intersection
  - avoid entering the intersection until it is clear
  should:
  - acknowledge the gesture through compliant motion
  - remain stationary and predictable while yielding
  should_not:
  - "ignore or override the human\u2019s gesture"
  - proceed into the intersection prematurely
  - display ambiguous motion while waiting
relevant_principles:
- P0
- P1
- P2
- P3
- P4
ideal_outcome: human gestures the robot to wait; human crosses first, then robot proceeds
  without collision
related_scenarios:
- intersection_gesture_proceed
- intersection_no_gesture
cited_in:
- '126'
evaluation_notes: "This scenario evaluates the robot\u2019s ability to comply with\
  \ explicit human social signals. Successful behavior prioritizes deference and safety\
  \ over efficiency, reinforcing trust and predictability.\nFailure modes include\
  \ ignoring the gesture, partial compliance that introduces ambiguity, or delayed\
  \ responses that undermine the signal.\nRelated Scenarios note: `related_scenarios`\
  \ includes P&G Table 3's own citation for this scenario (intersection_gesture_proceed,\
  \ listed as \"Gesture Proceed\") plus intersection_no_gesture, since Table 3's Related\
  \ Scenarios field is a single citation, not an exhaustive list. This is expected\
  \ per the related_scenarios convention (prosoc-scenario-audit's audit_checklist.md)."
