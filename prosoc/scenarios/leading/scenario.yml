id: leading_01
name: Leading
summary: 'A robot in a leader role guides a human through a walking space, choosing
  the path and pace, while the human''s task is to follow. The robot must move legibly,
  match its pace to the human''s ability, and monitor whether the human remains present
  and following.

  '
scientific_purpose: joint navigation
geometric_layout: walking space
context:
  environment:
    type: generic
    setting: indoor or outdoor pedestrian walking space
    width: moderate
  social_setting:
    formality: informal
    crowd_level: low
agents:
  robot:
    role: leader
    capabilities:
    - forward_motion
    - steering
    - stopping
    - speed_adjustment
    - human_tracking
    - gesture_or_signal_output
  humans:
  - role: follower
    count: 1
    attributes:
      mobility: typical
      awareness: typical
initial_conditions:
  robot_position: ahead of the human, at the start of the route
  human_position: behind the robot, ready to follow
intended_robot_task: lead the human to a destination
intended_human_behavior: follow the robot, tracking its path and pace
expected_behaviors:
  must:
  - avoid collision with the human, other pedestrians, and obstacles
  - not proceed to the destination while unaware the human has been separated
  should:
  - choose a pace appropriate to the human's demonstrated walking speed
  - signal upcoming turns with enough lead time for the human to follow
  - pause or slow when the human falls behind, hesitates, or is blocked
  - periodically confirm the human is still following
  should_not:
  - move at a fixed pace regardless of whether the human keeps up
  - turn sharply or suddenly without warning
  - continue navigating obliviously after losing track of the human
relevant_principles:
- P1
- P3
- P6
- P8
ideal_outcome: person follows the robot to the destination, with the robot adapting
  pace and signaling turns so the human stays with it
scenario_usage_guide:
  success_metrics:
  - SR
  - NoCollisions
  - TTG
  quality_metrics:
  - P3
  - P6
  failure_modes:
  - robot loses the human without noticing and continues to the destination alone
  - robot's pace is mismatched to the human's ability, causing separation
  - robot turns without adequate warning, confusing the human
  - human is uncertain whether the robot is actually leading (ambiguous role signaling)
  labeling_criteria:
  - robot is in a leader role relative to a single following human
  - the robot's path determines the intended route, and the human's task is to track
    it
  - the robot has some means of monitoring the human's continued presence
evaluation_notes: "This scenario should be evaluated over a sustained trajectory,\
  \ sampling multiple turns and at least one pace-mismatch or hesitation event within\
  \ a single episode, rather than a single conflict point.\nEvaluators should distinguish\
  \ a robot that proactively monitors and adapts to the human (checking for separation,\
  \ adjusting pace) from one that merely executes a fixed route irrespective of the\
  \ human's state \u2014 the latter should be scored as a failure even if the human\
  \ happens to keep up.\nThis scenario is related to Tour Guide (a specialized, extended\
  \ variant not separately defined in Table 3) and is the role-reversed counterpart\
  \ of Following, where the human leads and the robot tracks them instead."
