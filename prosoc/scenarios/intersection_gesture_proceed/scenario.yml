id: intersection_gesture_proceed_01
name: "Intersection \u2013 Gesture Proceed"
summary: 'A robot and a human pedestrian approach an indoor intersection. The human
  explicitly gestures for the robot to proceed. The robot must recognize the gesture
  and cross the intersection safely, legibly, and without undue delay.

  '
scientific_purpose: pedestrian interaction
geometric_layout: intersection
context:
  environment:
    type: indoor
    setting: hallway intersection
    width: moderate
  social_setting:
    formality: informal
    crowd_level: low
agents:
  robot:
    role: servant
    capabilities:
    - forward_motion
    - speed_adjustment
    - stopping
    - gesture_recognition
    - path_commitment
  humans:
  - role: pedestrian
    count: 1
    attributes:
      mobility: typical
      gesturing: proceed
initial_conditions:
  approach_pattern: orthogonal
  arrival_timing: near_simultaneous
  visibility: mutual
intended_robot_task: navigate from A to B
intended_human_behavior: cross navigate (gesture proceed)
expected_behaviors:
  must:
  - "recognize the human\u2019s gesture granting permission to proceed"
  - enter and traverse the intersection safely
  - avoid collision with the human
  should:
  - commit promptly to motion after the gesture
  - maintain a smooth and legible trajectory
  should_not:
  - hesitate excessively after permission is given
  - proceed aggressively or at unsafe speed
  - "undermine the clarity of the human\u2019s signal"
relevant_principles:
- P0
- P1
- P2
- P3
- P4
ideal_outcome: human gestures the robot to proceed; robot goes first and both cross
  without collision
related_scenarios:
- intersection_gesture_wait
- intersection_no_gesture
cited_in:
- '126'
scenario_usage_guide:
  success_metrics:
  - SR
  - NoCollisions
  quality_metrics:
  - P2
  - P3
  - P4
  failure_modes:
  - robot ignores the human's proceed gesture
  - robot hesitates excessively after permission is given
  - robot proceeds aggressively or at unsafe speed after the gesture
  labeling_criteria:
  - robot and human approach an indoor intersection from different directions
  - human gives an explicit gesture granting the robot permission to proceed
  - robot is capable of gesture recognition
evaluation_notes: "This scenario evaluates the robot\u2019s ability to act appropriately\
  \ on explicit human permission. Successful behavior demonstrates timely commitment,\
  \ predictable motion, and respect for the human\u2019s safety and comfort.\nFailure\
  \ modes include ignoring the gesture, delayed or ambiguous motion, or overly aggressive\
  \ crossing behavior.\nRelated Scenarios note: `related_scenarios` includes P&G Table\
  \ 3's own citation for this scenario (intersection_gesture_wait, listed as \"Gesture\
  \ Wait\") plus intersection_no_gesture, since Table 3's Related Scenarios field\
  \ is a single citation, not an exhaustive list. This is expected per the related_scenarios\
  \ convention (prosoc-scenario-audit's audit_checklist.md)."
